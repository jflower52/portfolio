<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PORTFOLIO</title>
    <!-- CSS스타일 -->
    <link rel="stylesheet" href="./CSS/style01.css" />
    <!-- SWIPER -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  </head>

  <body>
    <header>
      <nav class="wrapper">
        <a href="#portfolio">오호준의 Portfolio</a>
        <a href="#" id="toggle">
          <img src="토글 이미지 추가해야 함" />
        </a>
        <ul>
          <li><a href="#introduction">INTRODUCTION</a></li>
          <li><a href="#archiving">ARCHIVING</a></li>
          <li><a href="#project">PROJECT</a></li>
          <li><a href="#contact">CONTACT</a></li>
        </ul>
      </nav>
    </header>

    <section id="portfolio">
      <div class="wrapper">
        <div class="swiper">
          <!-- 추가로 필요한 래퍼 -->
          <div class="swiper-wrapper">
            <!-- 슬라이드들 -->
            <div class="swiper-slide">슬라이드 1</div>
            <div class="swiper-slide">슬라이드 2</div>
          </div>
          <!-- 네비게이션 버튼 -->
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
      </div>
    </section>

    <section id="introduction">INTRODUCTION</section>

    <section id="archiving">ARCHIVING</section>

    <section id="project">PROJECT</section>

    <section id="contact">CONTACT</section>

    <footer>푸터</footer>

    <!-- JS -->
    <script src="./JS/index.js"></script>
    <!-- SWIPER -->
    <script>
      const swiper = new Swiper(".swiper", {
        // 슬라이드 무한 루프
        loop: true,

        // 자동 슬라이드 기능
        autoplay: {
          // 슬라이드 4초마다 자동 전환
          delay: 4000,
          // 사용자가 슬라이드 조작해도 자동 슬라이드 기능 비활성화 방지
          disableOnInteraction: false,
        },

        // 네비게이션 화살표 (다음, 이전 슬라이드 이동)
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },
      });
    </script>
    <!-- AOS 스크립트 시작 -->
    <script>
      AOS.init();
    </script>
  </body>
</html>
